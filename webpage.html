<!DOCTYPE html>
<html>
<head>
<style>
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 50vh 50vh;
}
.box { display:flex; justify-content:center; align-items:center; font-size:20px; }
.b1 { background:red; }
.b2 { background:blue; }
.b3 { background:green; }
.b4 { background:orange; }
</style>
</head>
<body>
<div class="container">
  <div class="box b1">Section 1</div>
  <div class="box b2">Section 2</div>
  <div class="box b3">Section 3</div>
  <div class="box b4">Section 4</div>
</div>
</body>
</html>
